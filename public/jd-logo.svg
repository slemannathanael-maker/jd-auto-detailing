<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <!-- Background rounded rect -->
  <rect width="200" height="160" rx="22" fill="#0f1f5c"/>

  <!-- Swirl circles (background) -->
  <circle cx="130" cy="68" r="58" fill="none" stroke="#2a7a8a" stroke-width="6" opacity="0.55"/>
  <circle cx="130" cy="68" r="40" fill="none" stroke="#2a7a8a" stroke-width="5" opacity="0.35"/>

  <!-- Speed lines (left of car) -->
  <line x1="18" y1="52" x2="62" y2="52" stroke="#3ecfaf" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="10" y1="63" x2="58" y2="63" stroke="#3ecfaf" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="74" x2="60" y2="74" stroke="#3ecfaf" stroke-width="3" stroke-linecap="round"/>
  <line x1="26" y1="85" x2="62" y2="85" stroke="#3ecfaf" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="42" x2="55" y2="42" stroke="#3ecfaf" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Car body (sports car silhouette facing right) -->
  <!-- Main body -->
  <path d="M58 88 L62 72 L78 55 L108 48 L138 50 L162 62 L170 75 L172 88 Z"
        fill="#3ecfaf"/>
  <!-- Roof / cabin -->
  <path d="M80 55 L88 40 L118 36 L136 40 L138 50 L108 48 Z"
        fill="#3ecfaf"/>
  <!-- Front bumper detail -->
  <path d="M162 62 L172 68 L174 80 L170 88 L162 88 Z"
        fill="#35b89a"/>
  <!-- Windshield (dark) -->
  <path d="M88 52 L96 40 L116 37 L126 43 L122 52 Z"
        fill="#0f1f5c" opacity="0.6"/>
  <!-- Rear window -->
  <path d="M126 43 L134 42 L136 50 L122 52 Z"
        fill="#0f1f5c" opacity="0.6"/>

  <!-- Front wheel -->
  <circle cx="150" cy="90" r="14" fill="#0f1f5c"/>
  <circle cx="150" cy="90" r="10" fill="#3ecfaf"/>
  <circle cx="150" cy="90" r="6" fill="#0f1f5c"/>
  <!-- Wheel spokes -->
  <line x1="150" y1="84" x2="150" y2="96" stroke="#3ecfaf" stroke-width="2"/>
  <line x1="144" y1="90" x2="156" y2="90" stroke="#3ecfaf" stroke-width="2"/>

  <!-- Rear wheel -->
  <circle cx="88" cy="90" r="14" fill="#0f1f5c"/>
  <circle cx="88" cy="90" r="10" fill="#3ecfaf"/>
  <circle cx="88" cy="90" r="6" fill="#0f1f5c"/>
  <!-- Wheel spokes -->
  <line x1="88" y1="84" x2="88" y2="96" stroke="#3ecfaf" stroke-width="2"/>
  <line x1="82" y1="90" x2="94" y2="90" stroke="#3ecfaf" stroke-width="2"/>

  <!-- Spoiler -->
  <path d="M58 78 L64 75 L62 88 L58 88 Z" fill="#35b89a"/>

  <!-- Bottom banner -->
  <rect x="14" y="108" width="172" height="40" rx="10" fill="#0a1540" opacity="0.9"/>
  <rect x="14" y="108" width="172" height="40" rx="10" fill="none" stroke="#3ecfaf" stroke-width="1.5" opacity="0.5"/>

  <!-- Text: JD AUTO DETAILING -->
  <text x="100" y="133" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="13" font-weight="900" letter-spacing="0.5">
    <tspan fill="white">JD </tspan><tspan fill="#3ecfaf">AUTO </tspan><tspan fill="white">DETAILING</tspan>
  </text>
</svg>
